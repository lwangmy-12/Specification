services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: odot-spec-assistant:latest
    container_name: odot-spec-assistant
    ports:
      - "8000:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - LLM_MODEL=${LLM_MODEL:-gpt-4o-mini}
    volumes:
      - ./doc:/app/doc:ro
      # Bind mount to host directory — vector stores survive rebuilds and docker down -v
      - ./vector_store:/app/vector_store
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
